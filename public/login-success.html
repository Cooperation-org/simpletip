<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signed In — SimpleTip</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; }
  .msg { text-align: center; }
  .check { font-size: 3rem; }
  h2 { color: #16a34a; font-size: 1.1rem; margin: 8px 0 4px; }
  p { color: #888; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="msg">
  <div class="check">&#10003;</div>
  <h2>Signed in!</h2>
  <p>This window will close automatically.</p>
</div>
<script>
  // Extract wallet info from URL params and pass to opener
  const params = new URLSearchParams(window.location.search);
  const wallet = {
    token: params.get('token'),
    balance: parseFloat(params.get('balance') || '0'),
    name: params.get('name') || '',
    handle: params.get('handle') || '',
    did: params.get('did') || '',
  };

  if (wallet.token) {
    // Save to this domain's localStorage
    localStorage.setItem('simpletip_wallet', JSON.stringify(wallet));
    // Notify the opener (the page with the widget)
    if (window.opener) {
      window.opener.postMessage({ type: 'simpletip-auth', wallet }, '*');
    }
  }

  // Close popup after a moment
  setTimeout(() => window.close(), 1500);
</script>
</body>
</html>
