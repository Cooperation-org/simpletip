<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimpleTip — Complete Payment</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 380px; width: 100%; }
  h2 { font-size: 1.1rem; color: #3f2534; margin-bottom: 4px; }
  .amount { font-size: 2.2rem; font-weight: 700; color: #00b2e5; margin: 12px 0; }
  .recipient { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
  .pay-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .pay-apple { background: #000; color: #fff; }
  .pay-google { background: #fff; color: #333; border: 1px solid #ddd; }
  .pay-card { background: #00b2e5; color: #fff; }
  .pay-btn:hover { opacity: 0.9; }
  .or { font-size: 0.8rem; color: #999; margin: 8px 0; }
  .note { font-size: 0.72rem; color: #999; margin-top: 16px; }
  .success { display: none; }
  .success.show { display: block; }
  .success .check { font-size: 2.5rem; color: #22c55e; }
  .form { }
  .form.hide { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="form" id="form">
    <h2>SimpleTip</h2>
    <div class="amount" id="amount"></div>
    <div class="recipient" id="recipient"></div>
    <button class="pay-btn pay-apple" onclick="pay()"> Pay with Apple Pay</button>
    <button class="pay-btn pay-google" onclick="pay()">Pay with Google Pay</button>
    <div class="or">or</div>
    <button class="pay-btn pay-card" onclick="pay()">Pay with Card</button>
    <div class="note">
      Demo mode — no real charge. In production this is a Stripe Checkout session.
    </div>
  </div>
  <div class="success" id="success">
    <div class="check">&#10003;</div>
    <h2 style="margin-top:12px;">Tip sent!</h2>
    <div class="recipient" id="recipient2" style="margin-top:8px;"></div>
    <div class="note">This window will close automatically.</div>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const amount = params.get('amount') || '3';
  const author = params.get('author') || 'Author';
  const tipId = params.get('tip') || '';
  const session = params.get('session') || '';

  document.getElementById('amount').textContent = '$' + amount;
  document.getElementById('recipient').textContent = 'Tip for ' + decodeURIComponent(author);
  document.getElementById('recipient2').textContent = '$' + amount + ' to ' + decodeURIComponent(author);

  async function pay() {
    // Confirm the tip on the backend
    await fetch('/simpletip/api/tip/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipId, sessionId: session }),
    });

    document.getElementById('form').classList.add('hide');
    document.getElementById('success').classList.add('show');

    // Notify parent window
    if (window.opener) {
      window.opener.postMessage({ type: 'simpletip-payment-complete', amount, tipId }, '*');
    }

    // Auto-close after 2s
    setTimeout(() => window.close(), 2000);
  }
</script>
</body>
</html>
